<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <title>Contato</title>


</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    
    <div class="card shadow-lg p-4 w-100" style="max-width: 700px;">
        
        <h2 class="text-center mb-4 text-success">Fale Conosco</h2>

        <form>

            <!-- Nome -->
            <div class="mb-3">
                <label for="nome" class="form-label">Nome completo: </label>
                <input id="nome" type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">E-mail: </label>
                <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <!-- Telefone -->
            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone: </label>
                <input type="tel" class="form-control" id="telefone" placeholder="(99) 99999-9999">
            </div>

            <!-- Assunto -->
            <div class="mb-3">
                <label for="assunto" class="form-label">Assunto: </label>
                <select class="form-select" id="assunto" required>
                    <option value="">Selecione uma opção</option>
                    <option value="critica">Críticas</option>
                    <option value="sugestao">Sugestões</option>
                    <option value="duvida">Dúvidas</option>
                    <option value="erro">Relatar erro</option>
                    <option value="outros">Outros</option>
                </select>
            </div>

            <!-- Mensagem -->
            <div class="mb-4">
                <label for="mensagem" class="form-label">Mensagem:</label>
                <textarea class="form-control" id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <!-- Botões -->
            <div class="d-flex justify-content-between">
                <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                <button type="submit" class="btn btn-success">Enviar Mensagem</button>
            </div>

        </form>
    </div>

</div>

<script src="/js/telefone.js"></script>

</body>
</html>
